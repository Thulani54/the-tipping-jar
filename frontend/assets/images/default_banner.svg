<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C896;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#00A67D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007A5E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.32" />
    </linearGradient>
  </defs>
  <!-- Background gradient -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <!-- Subtle circle accents -->
  <circle cx="1050" cy="60" r="180" fill="#ffffff" fill-opacity="0.04"/>
  <circle cx="900" cy="260" r="120" fill="#ffffff" fill-opacity="0.04"/>
  <circle cx="200" cy="30" r="140" fill="#ffffff" fill-opacity="0.04"/>
  <circle cx="60" cy="220" r="90" fill="#ffffff" fill-opacity="0.03"/>
  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#ffffff" fill-opacity="0.06"/>
  </pattern>
  <rect width="1200" height="300" fill="url(#dots)"/>
  <!-- Bottom fade overlay -->
  <rect width="1200" height="300" fill="url(#fade)"/>
</svg>
